stages:
  - build
  - deploy

build_project:
  stage: build
  image: node:20
  script:
    - echo "Checking environment variables..."
    - 'if [ -z "$VITE_MAPBOX_TOKEN" ]; then echo "ERROR: VITE_MAPBOX_TOKEN is not set!"; exit 1; else echo "VITE_MAPBOX_TOKEN is set"; fi'
    - echo "VITE_MAPBOX_TOKEN=$VITE_MAPBOX_TOKEN" > .env
    - echo "VITE_MAPBOX_TOKEN=$VITE_MAPBOX_TOKEN" > .env.production
    - echo "Verifying .env files were created:"
    - test -f .env && echo ".env file exists" || echo ".env file NOT found"
    - test -f .env.production && echo ".env.production file exists" || echo ".env.production file NOT found"
    - test -s .env && echo ".env file has content" || echo ".env file is EMPTY"
    - echo ".env file length: $(wc -c < .env) bytes"
    - echo ""
    - npm install
    - npm run build

deploy_project:
  stage: deploy
  image: node:20
  script:
    - |
      HTTP_STATUS=$(curl -s -o response.txt -w "%{http_code}" -X POST "https://ikgcartoapps.ethz.ch/deploy/project" \
      -H "Content-Type: application/json" \
      -H "x-project-secret: ${CI_PROJECT_SECRET}" \
      -d "{\"repository\": \"${CI_PROJECT_NAME}\", \"namespace\": \"${CI_PROJECT_NAMESPACE}\"}")
      
      if [ -f response.txt ]; then
        cat response.txt
      else
        echo "No response received."
      fi

      if [ "$HTTP_STATUS" -ne 200 ]; then
        exit 1
      fi
  only:
    - main
  when: manual
  allow_failure: false