<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Raster GLTF Model</title>
  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.181.0",
        "three/": "https://esm.sh/three@0.181.0/"
      }
    }
  </script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    #container {
      width: 100vw;
      height: 100vh;
    }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px;
      border-radius: 5px;
      z-index: 100;
      font-size: 12px;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="info">
    <div>Loading model...</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

    const infoDiv = document.getElementById('info');
    
    function updateInfo(text) {
      infoDiv.innerHTML = '<div>' + text + '</div>';
      console.log(text);
    }

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Sky blue

    // Camera
    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      100000
    );
    camera.position.set(0, 100, 500);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.getElementById('container').appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(100, 100, 50);
    directionalLight.castShadow = true;
    scene.add(directionalLight);

    // Grid helper
    const gridHelper = new THREE.GridHelper(10000, 20);
    scene.add(gridHelper);

    // Axes helper
    const axesHelper = new THREE.AxesHelper(1000);
    scene.add(axesHelper);

    // Load GLTF model
    updateInfo('Loading GLTF model from: data/raster.gltf');
    
    const loader = new GLTFLoader();
    
    loader.load(
      'data/raster.gltf',
      function (gltf) {
        updateInfo('✓ Model loaded successfully!');
        console.log('GLTF scene:', gltf.scene);
        console.log('Number of children:', gltf.scene.children.length);
        
        const model = gltf.scene;
        
        // Center and scale the model
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        
        console.log('Model center:', center);
        console.log('Model size:', size);
        console.log('Model bounding box:', {
          min: box.min,
          max: box.max
        });
        
        // Center the model
        model.position.sub(center);
        
        // Log detailed info
        updateInfo(`✓ Model loaded<br>
          Size: ${size.x.toFixed(2)} x ${size.y.toFixed(2)} x ${size.z.toFixed(2)}<br>
          Center: ${center.x.toFixed(2)}, ${center.y.toFixed(2)}, ${center.z.toFixed(2)}<br>
          Use mouse to rotate/zoom/pan`);
        
        scene.add(model);
        
        // Adjust camera to view the model
        const maxDimension = Math.max(size.x, size.y, size.z);
        const distance = maxDimension * 2;
        camera.position.set(distance, distance * 0.5, distance);
        controls.target.set(0, 0, 0);
        controls.update();
        
        // Add wireframe to see structure
        model.traverse((child) => {
          if (child.isMesh) {
            const wireframe = new THREE.WireframeGeometry(child.geometry);
            const line = new THREE.LineSegments(wireframe, new THREE.LineBasicMaterial({ color: 0x000000 }));
            child.add(line);
            console.log('Mesh found:', child.name || 'unnamed', 'vertices:', child.geometry.attributes.position.count);
          }
        });
      },
      function (progress) {
        const percent = (progress.loaded / progress.total * 100).toFixed(2);
        updateInfo('Loading: ' + percent + '%');
      },
      function (error) {
        updateInfo('✗ Error loading model: ' + error.message);
        console.error('Error loading GLTF:', error);
        
        // Try to fetch the file to see if it's accessible
        fetch('data/raster.gltf')
          .then(response => {
            if (response.ok) {
              updateInfo('File is accessible but failed to load as GLTF. Check console for details.');
            } else {
              updateInfo('File not found: ' + response.status + ' ' + response.statusText);
            }
          })
          .catch(err => {
            updateInfo('Cannot access file: ' + err.message);
          });
      }
    );

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
